<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropIQ – AI Investment Advisor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #6c63ff;
    }

    nav a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #fff;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    .hero {
      text-align: center;
      max-width: 680px;
    }

    .badge {
      display: inline-block;
      background: rgba(108, 99, 255, 0.15);
      border: 1px solid rgba(108, 99, 255, 0.4);
      color: #a29bfe;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 99px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #6c63ff 0%, #a29bfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: 1.15rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 44px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta {
      display: inline-block;
      background: #6c63ff;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 16px 36px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(108, 99, 255, 0.35);
    }

    .cta:hover {
      background: #7c74ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108, 99, 255, 0.5);
    }

    .cta:active {
      transform: translateY(0);
    }

    footer {
      text-align: center;
      padding: 24px;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Prop<span>IQ</span></div>
    <nav>
      <a href="#">Kontakt</a>
    </nav>
  </header>

  <main>
    <div class="hero">
      <div class="badge">AI · Nekretnine · Investicije</div>
      <h1>Pametnije investiraj<br>u <em>nekretnine</em></h1>
      <p class="description">
        PropIQ analizira tržišne podatke, lokacije i trendove u realnom vremenu
        kako bi ti pružio jasne, pouzdane preporuke za svaku investicijsku odluku.
      </p>
      <a href="#" class="cta">Počni besplatno</a>
    </div>
  </main>

  <footer>
    &copy; 2026 PropIQ. Sva prava pridržana.
  </footer>

</body>
</html>
